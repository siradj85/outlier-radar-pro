<title>NicheScope Pro — YouTube Niche Intelligence</title>
<style>

  a{color:var(--neon);text-decoration:none}
  .wrap{max-width:1150px;margin:0 auto;padding:22px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--neon),var(--accent));
    display:grid;place-items:center;font-size:24px;box-shadow:0 6px 22px #22d3ee44}
  .top h1{margin:0;font-size:1.55rem} .top p{margin:0;color:var(--muted);font-size:.85rem}
  .langbtn{margin-inline-start:auto;background:var(--chip);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:9px 14px;cursor:pointer;font-weight:800;font-size:.9rem}
  .panel{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
    border-radius:16px;padding:16px;margin-top:14px}
  .lbl{font-size:.8rem;color:var(--muted);margin-bottom:6px;display:block}
  input,select{width:100%;background:#0a1222;border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:11px 12px;font-size:.95rem;outline:none;font-family:inherit}
  input:focus,select:focus{border-color:var(--neon)}
  .row{display:flex;gap:12px;flex-wrap:wrap} .col{flex:1;min-width:200px}
  .comprow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .comprow input{flex:1}
  .rm{background:#2a1320;border:1px solid #7f1d1d;color:#fecaca;border-radius:10px;
    width:42px;height:42px;cursor:pointer;font-size:1rem;flex:none}
  .addbtn{background:transparent;border:1px dashed var(--line);color:var(--neon);border-radius:10px;
    padding:9px 14px;cursor:pointer;font-weight:700;font-size:.88rem}
  button{border:none;font-family:inherit}
  .go{width:100%;margin-top:14px;padding:15px;color:#04121f;border-radius:11px;font-weight:800;font-size:1rem;cursor:pointer;
    background:linear-gradient(135deg,var(--neon),var(--accent));box-shadow:0 8px 24px #22d3ee33}
  .go:hover{filter:brightness(1.07)} .go:disabled{opacity:.5;cursor:wait}
  .info{line-height:1.95;color:var(--muted);font-size:.9rem} .info b{color:var(--txt)}

  .tag{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.8rem}

  .ring{width:120px;height:120px;border-radius:50%;margin:6px auto 16px;
    background:conic-gradient(var(--neon) var(--pct,0%),#1b2942 0);display:grid;place-items:center;transition:.25s}
  .ring i{width:96px;height:96px;border-radius:50%;background:var(--bg2);display:grid;place-items:center;
    font-style:normal;font-weight:800;font-size:1.5rem;color:var(--neon)}
  .stages{max-width:540px;margin:0 auto;text-align:start}
  .stg{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin:6px 0;
    border:1px solid var(--line);background:#0c1426;color:var(--muted);transition:.3s;font-size:.92rem}
  .stg.act{border-color:var(--neon);color:var(--txt);box-shadow:0 0 0 1px var(--neon) inset}
  .stg.done{color:var(--green);border-color:#14532d}
  #report{display:none}

  .verdict h2{margin:.2em 0;font-size:2rem} .verdict p{margin:.2em 0;font-size:1.05rem}
  .v-green{background:#0c2a16;border-color:var(--green);color:#bbf7d0}
  .v-orange{background:#2a1e07;border-color:var(--orange);color:#fde68a}
  .v-red{background:#2a0f12;border-color:var(--red);color:#fecaca}
  .score{font-size:3rem;font-weight:900}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:14px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .metric .k{color:var(--muted);font-size:.82rem} .metric .v{font-size:1.5rem;font-weight:800;margin-top:4px}
  .metric small{color:var(--muted);font-size:.78rem;display:block;margin-top:4px;line-height:1.5}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}
  th,td{padding:9px;border-bottom:1px solid var(--line);text-align:start}
  th{color:var(--muted);font-weight:700} .pos{color:var(--green)} .neg{color:var(--red)}

  .err{background:#3b1320;border:1px solid #7f1d1d;color:#fecaca;border-radius:12px;padding:14px;margin-top:14px}
  .bar{height:9px;border-radius:6px;background:#1b2942;overflow:hidden;margin:5px 0}

const t=k=>(I18N[LANG][k]??I18N.en[k]??k);

const CATS=[

// ---- channel rows ----
function addRow(val=""){
  const d=document.createElement("div"); d.className="comprow";
  d.innerHTML=`<input placeholder="@channel  /  https://youtube.com/@..  /  UC..." value="${val.replace(/"/g,'&quot;')}"><button class="rm" onclick="this.parentNode.remove()">✕</button>`;

}
function readComps(){ return [...document.querySelectorAll("#compsList input")].map(i=>i.value.trim()).filter(Boolean).slice(0,5); }

// ---- YouTube API ----
async function yt(ep,params){
  params.key=API_KEY;
  const r=await fetch(YT+ep+"?"+new URLSearchParams(params));
  const j=await r.json();
  if(!r.ok){
    const reason=j?.error?.errors?.[0]?.reason||"";
    if(reason==="quotaExceeded") throw new Error(LANG==="ar"?"تجاوزت حصة API اليوم (10,000).":"Daily API quota exceeded (10,000).");
    if(reason==="keyInvalid") throw new Error(LANG==="ar"?"مفتاح API غير صالح.":"Invalid API key.");
    throw new Error(j?.error?.message||("HTTP "+r.status));
  }
  return j;
}
async function resolveId(raw){
  raw=raw.trim(); if(!raw) return null; let m;
  if(m=raw.match(/channel\/(UC[\w-]{20,})/)) return m[1];
  if(/^UC[\w-]{20,}$/.test(raw)) return raw;
  if(m=raw.match(/@([\w.\-]+)/)){ const j=await yt("channels",{part:"id",forHandle:m[1]}); if(j.items?.[0])return j.items[0].id; }
  if(m=raw.match(/\/(?:c|user)\/([\w.\-]+)/)){ const j=await yt("search",{part:"snippet",type:"channel",q:m[1],maxResults:1}); if(j.items?.[0])return j.items[0].snippet.channelId; }
  let j=await yt("channels",{part:"id",forHandle:raw.replace(/^@/,"")}); if(j.items?.[0])return j.items[0].id;
  j=await yt("search",{part:"snippet",type:"channel",q:raw,maxResults:1}); if(j.items?.[0])return j.items[0].snippet.channelId;
  return null;
}
function renderStages(active,done){
  $("#stages").innerHTML=t("stages").map((s,i)=>`<div class="stg ${i<done?'done':''} ${i===active?'act':''}">${i<done?'✅':(i===active?'⏳':'•')} ${s}</div>`).join("");
}
const setRing=p=>{ $("#ring").style.setProperty("--pct",p+"%"); $("#ringTxt").textContent=Math.round(p)+"%"; };

let DATA=null;

  clearErr(); $("#report").style.display="none";
  const niche=$("#niche").value.trim(), ci=+$("#cat").value||0, comps=readComps();
  if(!niche) return showErr(t("errNiche"));
  if(!comps.length) return showErr(t("errComp"));
  $("#go").disabled=true; $("#loader").style.display="block"; renderStages(0,0); setRing(0);
  const t0=Date.now(), MS=4000;
  const gate=async i=>{const w=t0+i*MS-Date.now(); if(w>0)await sleep(w);};
  (function anim(){const p=Math.min(99,(Date.now()-t0)/(MS*5)*100);setRing(p);if($("#loader").style.display!=="none"&&p<99)requestAnimationFrame(anim);})();
  try{
    renderStages(0,0);
    const ids=[]; for(const c of comps){const id=await resolveId(c); if(id)ids.push(id);}
    if(!ids.length) throw new Error(t("errNoCh"));
    const ch=await yt("channels",{part:"snippet,statistics,contentDetails",id:[...new Set(ids)].join(","),maxResults:50});
    await gate(1);
    renderStages(1,1);
    const channels=[];
    for(const c of (ch.items||[])){
      const cid=c.id, cc=cacheGet(cid); let vids=cc?.vids;
      if(!vids){ const pl=await yt("playlistItems",{part:"snippet",playlistId:c.contentDetails.relatedPlaylists.uploads,maxResults:50});
        vids=(pl.items||[]).map(it=>({id:it.snippet.resourceId.videoId,date:it.snippet.publishedAt,title:it.snippet.title})); }
      channels.push({id:cid,title:c.snippet.title,created:c.snippet.publishedAt,country:c.snippet.country||"",
        subs:+(c.statistics.subscriberCount||0),views:+(c.statistics.viewCount||0),vcount:+(c.statistics.videoCount||0),vids});
    }
    await gate(2);
    renderStages(2,2);
    for(const c of channels){
      const cc=cacheGet(c.id);
      if(cc?.stats) Object.assign(c,cc.stats);
      else{
        const ids2=c.vids.slice(0,40).map(v=>v.id).filter(Boolean); let totV=0,totE=0,n=0,rec=0,now=Date.now();
        for(let i=0;i<ids2.length;i+=50){ const v=await yt("videos",{part:"statistics,snippet",id:ids2.slice(i,i+50).join(",")});
          (v.items||[]).forEach(it=>{const vv=+(it.statistics.viewCount||0),lk=+(it.statistics.likeCount||0),cm=+(it.statistics.commentCount||0);
            totV+=vv; totE+=vv?(lk+cm)/vv:0; n++; if(now-new Date(it.snippet.publishedAt)<90*864e5)rec++;}); }
        c.avgViews=n?Math.round(totV/n):0; c.eng=n?totE/n*100:0; c.recent90=rec;
        cacheSet(c.id,{vids:c.vids,stats:{avgViews:c.avgViews,eng:c.eng,recent90:c.recent90}});
      }
      c.viral=c.subs>0?c.views/c.subs:(c.views>0?50:0); c.ageYears=(Date.now()-new Date(c.created))/31536e6;
    }
    await gate(3); renderStages(3,3);
    const meta=CATS[ci], rpmMid=(meta.rpm[0]+meta.rpm[1])/2;
    const avg=f=>channels.reduce((s,c)=>s+f(c),0)/channels.length;
    const avgViral=avg(c=>c.viral),avgSubs=avg(c=>c.subs),avgRecent=avg(c=>c.recent90),avgEng=avg(c=>c.eng),avgAvgViews=avg(c=>c.avgViews);
    const geoHigh=channels.filter(c=>HIGH_GEO[c.country]).length;
    const sViral=Math.min(100,avgViral*8),sFresh=Math.min(100,avgRecent*12),
      sMoney=Math.min(100,rpmMid/50*60+(meta.aff+meta.spo+meta.prod)/15*40),
      sSat=Math.max(0,100-Math.log10(Math.max(10,avgSubs))*16),sEng=Math.min(100,avgEng*18);
    const score=Math.round(sViral*.30+sFresh*.22+sMoney*.24+sSat*.16+sEng*.08);
    await gate(4); renderStages(4,4);
    const stop=new Set("the a an of to in on for and or your you how why what is are با ما لا و في من على عن الى إلى مع هذا هذه".split(/\s+/));
    const fr={}; channels.forEach(c=>c.vids.forEach(v=>v.title.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu," ").split(/\s+/).forEach(w=>{if(w.length>2&&!stop.has(w))fr[w]=(fr[w]||0)+1;})));
    const keywords=Object.entries(fr).sort((a,b)=>b[1]-a[1]).slice(0,12);
    await gate(5);
    DATA={niche,ci,meta,score,channels,avgViral,avgRecent,avgEng,avgAvgViews,geoHigh,keywords,sub:{sViral,sFresh,sMoney,sSat,sEng}};
    setRing(100); await sleep(250); $("#loader").style.display="none"; renderReport();
  }catch(e){ $("#loader").style.display="none"; showErr(e.message); }
  finally{ $("#go").disabled=false; }
}
const bar=(label,val,color)=>`<div><div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted)"><span>${label}</span><span>${Math.round(val)}</span></div><div class="bar"><i style="width:${Math.min(100,val)}%;background:${color}"></i></div></div>`;
function renderReport(){
  const d=DATA; if(!d) return; const meta=CATS[d.ci]; // category may relabel on lang switch
  const v=d.score>=66?["v-green",...t("vGreen")]:d.score>=42?["v-orange",...t("vOrange")]:["v-red",...t("vRed")];
  const pil=n=>"●".repeat(n)+"○".repeat(5-n);
  const estLo=Math.round(d.avgAvgViews*meta.rpm[0]/1000),estHi=Math.round(d.avgAvgViews*meta.rpm[1]/1000);
  const rows=d.channels.map(c=>{const rising=c.ageYears>1.5&&c.recent90>=3&&c.viral>3;
    return `<tr><td>${c.title.replace(/</g,"&lt;")} ${HIGH_GEO[c.country]?'🌍':''}</td><td>${num(c.subs)}</td>
      <td class="${c.viral>=5?'pos':c.viral<2?'neg':''}">${c.viral>=50?'∞':c.viral.toFixed(1)}×</td>
      <td>${num(c.avgViews)}</td><td>${c.eng.toFixed(1)}%</td><td>${c.ageYears.toFixed(1)} ${t("yrs")}</td>
      <td>${c.recent90} ${rising?'🚀':''}</td></tr>`;}).join("");
  $("#report").innerHTML=`
    <div class="verdict ${v[0]}"><div class="score">${d.score}/100</div><h2>${v[1]}</h2><p>${v[2]}</p></div>
    <div class="secttl">📊 ${t("coreT")}</div>
    <div class="cards">
      <div class="metric"><div class="k">${t("mViral")}</div><div class="v">${d.avgViral.toFixed(1)}×</div><small>${t("mViralD")}</small></div>
      <div class="metric"><div class="k">${t("mMom")}</div><div class="v">${d.avgRecent.toFixed(1)}</div><small>${t("mMomD")}</small></div>
      <div class="metric"><div class="k">${t("mRPM")}</div><div class="v">$${meta.rpm[0]}–$${meta.rpm[1]}</div><small>${t("mRPMD")} $${num(estLo)}–$${num(estHi)}</small></div>
      <div class="metric"><div class="k">${t("mEng")}</div><div class="v">${d.avgEng.toFixed(1)}%</div><small>${t("mEngD")}</small></div>
    </div>
    <div class="secttl">🎯 ${t("oppT")}</div>
    <div class="panel">${bar(t("bViral"),d.sub.sViral,"var(--neon)")}${bar(t("bFresh"),d.sub.sFresh,"var(--green)")}${bar(t("bMoney"),d.sub.sMoney,"var(--gold)")}${bar(t("bSat"),d.sub.sSat,"var(--accent)")}${bar(t("bEng"),d.sub.sEng,"var(--orange)")}</div>
    <div class="secttl">💰 ${t("monT")}</div>
    <div class="cards">
      <div class="metric"><div class="k">${t("moAds")}</div><div class="v" style="font-size:1.1rem;color:var(--gold)">$${meta.rpm[0]}–$${meta.rpm[1]}</div></div>
      <div class="metric"><div class="k">${t("moAff")}</div><div class="v" style="font-size:1.2rem">${pil(meta.aff)}</div></div>
      <div class="metric"><div class="k">${t("moSpo")}</div><div class="v" style="font-size:1.2rem">${pil(meta.spo)}</div></div>
      <div class="metric"><div class="k">${t("moProd")}</div><div class="v" style="font-size:1.2rem">${pil(meta.prod)}</div></div>
      <div class="metric"><div class="k">${t("moFace")}</div><div class="v" style="font-size:1.2rem">${pil(meta.faceless)}</div><small>${t("moFaceD")}</small></div>
      <div class="metric"><div class="k">${t("moGeo")}</div><div class="v">${d.geoHigh}/${d.channels.length}</div><small>${t("moGeoD")}</small></div>
    </div>
    <div class="secttl">🏆 ${t("compT")}</div>
    <div class="panel" style="overflow:auto"><table><tr><th>${t("thCh")}</th><th>${t("thSubs")}</th><th>${t("thViral")}</th><th>${t("thAvg")}</th><th>${t("thEng")}</th><th>${t("thAge")}</th><th>${t("thRec")}</th></tr>${rows}</table></div>
    <div class="secttl">🔑 ${t("kwT")}</div>
    <div class="kw">${d.keywords.map(([w,n])=>`<span>${w} <b style="color:var(--neon)">${n}</b></span>`).join("")||"—"}</div>`;
  $("#report").style.display="block"; $("#report").scrollIntoView({behavior:"smooth"});
}
// init: 3 default rows + language
addRow();addRow();addRow();
applyLang();
</script>
