<style>

  .seg{display:inline-flex;background:#0a1222;border:1px solid var(--line);border-radius:10px;overflow:hidden}

  .lbl{font-size:.8rem;color:var(--muted);margin-bottom:6px;display:block}

  .comprow{display:flex;gap:8px;align-items:center;margin-bottom:8px} .comprow input{flex:1}
  .rm{background:#2a1320;border:1px solid #7f1d1d;color:#fecaca;border-radius:10px;width:42px;height:42px;cursor:pointer;font-size:1rem;flex:none}

  .go:hover{filter:brightness(1.07)} .go:disabled{opacity:.5;cursor:wait}
  .info{line-height:1.95;color:var(--muted);font-size:.9rem} .info b{color:var(--txt)}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .tag{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.8rem}
  #loader{display:none;text-align:center;padding:18px}
  .ring{width:120px;height:120px;border-radius:50%;margin:6px auto 16px;background:conic-gradient(var(--neon) var(--pct,0%),#1b2942 0);display:grid;place-items:center;transition:.25s}
  .ring i{width:96px;height:96px;border-radius:50%;background:var(--bg2);display:grid;place-items:center;font-style:normal;font-weight:800;font-size:1.5rem;color:var(--neon)}

  .stg{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin:6px 0;border:1px solid var(--line);background:#0c1426;color:var(--muted);transition:.3s;font-size:.92rem}

  .v-red{background:#2a0f12;border-color:var(--red);color:#fecaca}

  .metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .metric .k{color:var(--muted);font-size:.82rem} .metric .v{font-size:1.5rem;font-weight:800;margin-top:4px}
  .metric small{color:var(--muted);font-size:.78rem;display:block;margin-top:4px;line-height:1.5}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.84rem}
  th,td{padding:8px;border-bottom:1px solid var(--line);text-align:start} th{color:var(--muted);font-weight:700}
  .pos{color:var(--green)} .neg{color:var(--red)}

  .vcard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .vcard .th{position:relative;aspect-ratio:16/9;background:#000} .vcard img{width:100%;height:100%;object-fit:cover}

  .bar{height:9px;border-radius:6px;background:#1b2942;overflow:hidden;margin:5px 0} .bar i{display:block;height:100%;border-radius:6px}
  footer{color:var(--muted);text-align:center;font-size:.8rem;padding:26px 0 10px}

async function yt(ep,params){ params.key=API_KEY;
  const r=await fetch(YT+ep+"?"+new URLSearchParams(params)); const j=await r.json();
  if(!r.ok){ const reason=j?.error?.errors?.[0]?.reason||"";
    if(reason==="quotaExceeded") throw new Error(LANG==="ar"?"تجاوزت حصة API اليوم (10,000).":"Daily API quota exceeded (10,000).");
    if(reason==="keyInvalid") throw new Error(LANG==="ar"?"مفتاح API غير صالح.":"Invalid API key.");
    throw new Error(j?.error?.message||("HTTP "+r.status)); } return j; }
async function resolveId(raw){ raw=raw.trim(); if(!raw) return null; let m;
  if(m=raw.match(/channel\/(UC[\w-]{20,})/)) return m[1];
  if(/^UC[\w-]{20,}$/.test(raw)) return raw;
  if(m=raw.match(/@([\w.\-]+)/)){ const j=await yt("channels",{part:"id",forHandle:m[1]}); if(j.items?.[0])return j.items[0].id; }
  if(m=raw.match(/\/(?:c|user)\/([\w.\-]+)/)){ const j=await yt("search",{part:"snippet",type:"channel",q:m[1],maxResults:1}); if(j.items?.[0])return j.items[0].snippet.channelId; }
  let j=await yt("channels",{part:"id",forHandle:raw.replace(/^@/,"")}); if(j.items?.[0])return j.items[0].id;
  j=await yt("search",{part:"snippet",type:"channel",q:raw,maxResults:1}); if(j.items?.[0])return j.items[0].snippet.channelId; return null; }
const renderStages=(a,d)=>$("#stages").innerHTML=t("stages").map((s,i)=>`<div class="stg ${i<d?'done':''} ${i===a?'act':''}">${i<d?'✅':(i===a?'⏳':'•')} ${s}</div>`).join("");
const setRing=p=>{ $("#ring").style.setProperty("--pct",p+"%"); $("#ringTxt").textContent=Math.round(p)+"%"; };

let DATA=null;
async function analyze(){
  clearErr(); $("#report").style.display="none";
  const niche=$("#niche").value.trim(),ci=+$("#cat").value||0,comps=readComps();
  if(!niche) return showErr(t("errNiche")); if(MODE==="channels"&&!comps.length) return showErr(t("errComp"));
  $("#go").disabled=true; $("#loader").style.display="block"; renderStages(0,0); setRing(0);
  const t0=Date.now(),MS=4000; const gate=async i=>{const w=t0+i*MS-Date.now(); if(w>0)await sleep(w);};
  (function anim(){const p=Math.min(99,(Date.now()-t0)/(MS*5)*100);setRing(p);if($("#loader").style.display!=="none"&&p<99)requestAnimationFrame(anim);})();
  try{
    renderStages(0,0);
    let ids=[],kwTop=null;
    if(MODE==="keyword"){
      const s=await yt("search",{part:"snippet",type:"video",q:niche,order:"viewCount",maxResults:50});
      const vid=(s.items||[]).map(it=>it.id.videoId).filter(Boolean);
      if(!vid.length) throw new Error(t("errNoRes"));
      const vmeta=[];
      for(let i=0;i<vid.length;i+=50){ const v=await yt("videos",{part:"statistics,snippet",id:vid.slice(i,i+50).join(",")});
        (v.items||[]).forEach(it=>vmeta.push({id:it.id,title:it.snippet.title,views:+(it.statistics.viewCount||0),cid:it.snippet.channelId,thumb:(it.snippet.thumbnails.medium||it.snippet.thumbnails.default||{}).url})); }
      const ucids=[...new Set(vmeta.map(v=>v.cid))],subMap={},titleMap={};
      for(let i=0;i<ucids.length;i+=50){ const c=await yt("channels",{part:"statistics,snippet",id:ucids.slice(i,i+50).join(",")});
        (c.items||[]).forEach(x=>{subMap[x.id]=+(x.statistics.subscriberCount||0);titleMap[x.id]=x.snippet.title;}); }
      kwTop=vmeta.map(v=>({id:v.id,title:v.title,views:v.views,subs:subMap[v.cid]||0,thumb:v.thumb,ch:titleMap[v.cid]||""}))
            .sort((a,b)=>(b.views/Math.max(1,b.subs))-(a.views/Math.max(1,a.subs))).slice(0,8);
      const byCh={}; vmeta.forEach(v=>byCh[v.cid]=(byCh[v.cid]||0)+v.views);
      ids=Object.entries(byCh).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);
    } else {
      for(const c of comps){const id=await resolveId(c); if(id)ids.push(id);}
    }
    if(!ids.length) throw new Error(MODE==="keyword"?t("errNoRes"):t("errNoCh"));
    const ch=await yt("channels",{part:"snippet,statistics,contentDetails",id:[...new Set(ids)].join(","),maxResults:50});
    await gate(1); renderStages(1,1);
    const channels=[];
    for(const c of (ch.items||[])){
      const cid=c.id,cc=cacheGet(cid); let vids=cc?.vids;
      if(!vids){ const pl=await yt("playlistItems",{part:"snippet",playlistId:c.contentDetails.relatedPlaylists.uploads,maxResults:50});
        vids=(pl.items||[]).map(it=>({id:it.snippet.resourceId.videoId,date:it.snippet.publishedAt,title:it.snippet.title})); }
      channels.push({id:cid,title:c.snippet.title,created:c.snippet.publishedAt,country:c.snippet.country||"",
        subs:+(c.statistics.subscriberCount||0),views:+(c.statistics.viewCount||0),vcount:+(c.statistics.videoCount||0),
        up:c.contentDetails.relatedPlaylists.uploads,vids});
    }
    await gate(2); renderStages(2,2);
    const TOPV=[];
    for(const c of channels){
      const cc=cacheGet(c.id);
      if(cc?.stats){ Object.assign(c,cc.stats); if(cc.top)TOPV.push(...cc.top); }
      else{
        const ids2=c.vids.slice(0,40).map(v=>v.id).filter(Boolean); let totV=0,totE=0,n=0,rec=0,now=Date.now(); const tops=[];
        for(let i=0;i<ids2.length;i+=50){ const v=await yt("videos",{part:"statistics,snippet",id:ids2.slice(i,i+50).join(",")});
          (v.items||[]).forEach(it=>{const vv=+(it.statistics.viewCount||0),lk=+(it.statistics.likeCount||0),cm=+(it.statistics.commentCount||0);
            totV+=vv; totE+=vv?(lk+cm)/vv:0; n++; if(now-new Date(it.snippet.publishedAt)<90*864e5)rec++;
            tops.push({id:it.id,title:it.snippet.title,views:vv,thumb:(it.snippet.thumbnails.medium||it.snippet.thumbnails.default||{}).url,subs:c.subs,ch:c.title});}); }
        c.avgViews=n?Math.round(totV/n):0; c.eng=n?totE/n*100:0; c.recent90=rec;
        // true working age: page uploads to the oldest (cap 10 pages = 500 vids)
        let oldest=null,pg=await yt("playlistItems",{part:"snippet",playlistId:c.up,maxResults:50}),token=pg.nextPageToken,pages=1;
        (pg.items||[]).forEach(it=>{const dt=it.snippet.publishedAt; if(!oldest||dt<oldest)oldest=dt;});
        while(token&&pages<10){ pg=await yt("playlistItems",{part:"snippet",playlistId:c.up,maxResults:50,pageToken:token});
          (pg.items||[]).forEach(it=>{const dt=it.snippet.publishedAt; if(!oldest||dt<oldest)oldest=dt;}); token=pg.nextPageToken; pages++; }
        c.capped=!!token; c.firstDate=c.capped?c.created:(oldest||c.created); // very prolific -> treat as established
        const top=tops.sort((a,b)=>b.views-a.views).slice(0,4);
        cacheSet(c.id,{vids:c.vids,stats:{avgViews:c.avgViews,eng:c.eng,recent90:c.recent90,firstDate:c.firstDate,capped:c.capped},top});
        TOPV.push(...top);
      }
      c.viral=c.subs>0?c.views/c.subs:(c.views>0?50:0);
      c.ageYears=(Date.now()-new Date(c.created))/31536e6;
      c.workYears=(Date.now()-new Date(c.firstDate||c.created))/31536e6;
      c.pivot=!c.capped && (c.ageYears-c.workYears)>0.5;
    }
    await gate(3); renderStages(3,3);
    const meta=CATS[ci],rpmMid=(meta.rpm[0]+meta.rpm[1])/2,avg=f=>channels.reduce((s,c)=>s+f(c),0)/channels.length;
    const avgViral=avg(c=>c.viral),avgSubs=avg(c=>c.subs),avgRecent=avg(c=>c.recent90),avgEng=avg(c=>c.eng),avgAvgViews=avg(c=>c.avgViews);
    const geoHigh=channels.filter(c=>HIGH_GEO[c.country]).length;
    const sViral=Math.min(100,avgViral*8),sFresh=Math.min(100,avgRecent*12),
      sMoney=Math.min(100,rpmMid/50*60+(meta.aff+meta.spo+meta.prod)/15*40),
      sSat=Math.max(0,100-Math.log10(Math.max(10,avgSubs))*16),sEng=Math.min(100,avgEng*18);
    const score=Math.round(sViral*.30+sFresh*.22+sMoney*.24+sSat*.16+sEng*.08);
    await gate(4); renderStages(4,4);
    const stop=new Set("the a an of to in on for and or your you how why what is are با ما لا و في من على عن الى إلى مع هذا هذه".split(/\s+/));
    const fr={}; channels.forEach(c=>c.vids.forEach(v=>v.title.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu," ").split(/\s+/).forEach(w=>{if(w.length>2&&!stop.has(w))fr[w]=(fr[w]||0)+1;})));
    const keywords=Object.entries(fr).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const topVideos= kwTop || [...new Map(TOPV.map(v=>[v.id,v])).values()].sort((a,b)=>(b.views/Math.max(1,b.subs))-(a.views/Math.max(1,a.subs))).slice(0,8);
    await gate(5);
    DATA={niche,ci,score,channels,avgViral,avgRecent,avgEng,avgAvgViews,geoHigh,keywords,topVideos,sub:{sViral,sFresh,sMoney,sSat,sEng}};
    setRing(100); await sleep(250); $("#loader").style.display="none"; renderReport();
  }catch(e){ $("#loader").style.display="none"; showErr(e.message); }
  finally{ $("#go").disabled=false; }
}
const bar=(l,v,c)=>`<div><div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted)"><span>${l}</span><span>${Math.round(v)}</span></div><div class="bar"><i style="width:${Math.min(100,v)}%;background:${c}"></i></div></div>`;
const fmtAge=y=> y>=1? y.toFixed(1)+" "+t("yrs") : Math.max(1,Math.round(y*12))+" "+t("mo");
function renderReport(){
  const d=DATA; if(!d) return; const meta=CATS[d.ci];
  const v=d.score>=66?["v-green",...t("vGreen")]:d.score>=42?["v-orange",...t("vOrange")]:["v-red",...t("vRed")];
  const pil=n=>"●".repeat(n)+"○".repeat(5-n);
  const estLo=Math.round(d.avgAvgViews*meta.rpm[0]/1000),estHi=Math.round(d.avgAvgViews*meta.rpm[1]/1000);
  const rows=d.channels.map(c=>{const rising=c.recent90>=3&&c.viral>3;
    return `<tr><td>${c.title.replace(/</g,"&lt;")} ${HIGH_GEO[c.country]?'🌍':''}</td><td>${num(c.subs)}</td>
      <td class="${c.viral>=5?'pos':c.viral<2?'neg':''}">${c.viral>=50?'∞':c.viral.toFixed(1)}×</td>
      <td>${num(c.avgViews)}</td><td>${c.eng.toFixed(1)}%</td>
      <td>${fmtAge(c.ageYears)}</td>
      <td class="${c.pivot?'pos':''}">${fmtAge(c.workYears)}${c.capped?'+':''} ${c.pivot?'🔄':''} ${rising?'🚀':''}</td>
      <td>${c.recent90}</td></tr>`;}).join("");
  const vids=d.topVideos.map(x=>{const xr=x.subs>0?x.views/x.subs:50;
    return `<a class="vcard" href="https://youtu.be/${x.id}" target="_blank"><div class="th"><img loading="lazy" src="${x.thumb||''}"><span class="xb">${xr>=50?'∞':xr.toFixed(1)}×</span></div>
      <div class="tt">${x.title.replace(/</g,"&lt;")}</div><div class="mt">${x.ch.replace(/</g,"&lt;")} · ${num(x.views)} 👁</div></a>`;}).join("");
  $("#report").innerHTML=`
    <div class="verdict ${v[0]}"><div class="score">${d.score}/100</div><h2>${v[1]}</h2><p>${v[2]}</p></div>
    <div style="text-align:center;margin-top:10px"><button class="addbtn noprint" onclick="window.print()">${t("print")}</button></div>
    <div class="secttl">📊 ${t("coreT")}</div>
    <div class="cards">
      <div class="metric"><div class="k">${t("mViral")}</div><div class="v">${d.avgViral.toFixed(1)}×</div><small>${t("mViralD")}</small></div>
      <div class="metric"><div class="k">${t("mMom")}</div><div class="v">${d.avgRecent.toFixed(1)}</div><small>${t("mMomD")}</small></div>
      <div class="metric"><div class="k">${t("mRPM")}</div><div class="v">$${meta.rpm[0]}–$${meta.rpm[1]}</div><small>${t("mRPMD")} $${num(estLo)}–$${num(estHi)}</small></div>
      <div class="metric"><div class="k">${t("mEng")}</div><div class="v">${d.avgEng.toFixed(1)}%</div><small>${t("mEngD")}</small></div>
    </div>
    <div class="secttl">🎯 ${t("oppT")}</div>
    <div class="panel">${bar(t("bViral"),d.sub.sViral,"var(--neon)")}${bar(t("bFresh"),d.sub.sFresh,"var(--green)")}${bar(t("bMoney"),d.sub.sMoney,"var(--gold)")}${bar(t("bSat"),d.sub.sSat,"var(--accent)")}${bar(t("bEng"),d.sub.sEng,"var(--orange)")}</div>
    <div class="secttl">${t("topT")}</div>
    <div class="vidgrid">${vids||"—"}</div>
    <div class="secttl">💰 ${t("monT")}</div>
    <div class="cards">
      <div class="metric"><div class="k">${t("moAds")}</div><div class="v" style="font-size:1.1rem;color:var(--gold)">$${meta.rpm[0]}–$${meta.rpm[1]}</div></div>
      <div class="metric"><div class="k">${t("moAff")}</div><div class="v" style="font-size:1.2rem">${pil(meta.aff)}</div></div>
      <div class="metric"><div class="k">${t("moSpo")}</div><div class="v" style="font-size:1.2rem">${pil(meta.spo)}</div></div>
      <div class="metric"><div class="k">${t("moProd")}</div><div class="v" style="font-size:1.2rem">${pil(meta.prod)}</div></div>
      <div class="metric"><div class="k">${t("moFace")}</div><div class="v" style="font-size:1.2rem">${pil(meta.faceless)}</div><small>${t("moFaceD")}</small></div>
      <div class="metric"><div class="k">${t("moGeo")}</div><div class="v">${d.geoHigh}/${d.channels.length}</div><small>${t("moGeoD")}</small></div>
    </div>
    <div class="secttl">🏆 ${t("compT")}</div>
    <div class="info" style="margin:2px">${t("compHint")}</div>
    <div class="panel" style="overflow:auto"><table><tr><th>${t("thCh")}</th><th>${t("thSubs")}</th><th>${t("thViral")}</th><th>${t("thAvg")}</th><th>${t("thEng")}</th><th>${t("thAge")}</th><th>${t("thWork")}</th><th>${t("thRec")}</th></tr>${rows}</table></div>
    <div class="secttl">🔑 ${t("kwT")}</div>
    <div class="kw">${d.keywords.map(([w,n])=>`<span>${w} <b style="color:var(--neon)">${n}</b></span>`).join("")||"—"}</div>`;
  $("#report").style.display="block"; $("#report").scrollIntoView({behavior:"smooth"});
}
